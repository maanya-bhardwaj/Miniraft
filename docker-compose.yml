version: "3.9"

networks:
  raft-net:
    driver: bridge

services:
  replica1:
    build: ./replica1
    container_name: replica1
    environment:
      - REPLICA_ID=replica1
      - PORT=4001
      - PEERS=http://replica2:4002,http://replica3:4003
    ports:
      - "4001:4001"
    volumes:
      - ./replica1:/app
      - /app/node_modules
    networks:
      - raft-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  replica2:
    build: ./replica2
    container_name: replica2
    environment:
      - REPLICA_ID=replica2
      - PORT=4002
      - PEERS=http://replica1:4001,http://replica3:4003
    ports:
      - "4002:4002"
    volumes:
      - ./replica2:/app
      - /app/node_modules
    networks:
      - raft-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4002/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  replica3:
    build: ./replica3
    container_name: replica3
    environment:
      - REPLICA_ID=replica3
      - PORT=4003
      - PEERS=http://replica1:4001,http://replica2:4002
    ports:
      - "4003:4003"
    volumes:
      - ./replica3:/app
      - /app/node_modules
    networks:
      - raft-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4003/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway:
    build: ./gateway
    container_name: gateway
    environment:
      - PORT=3000
      - REPLICAS=http://replica1:4001,http://replica2:4002,http://replica3:4003
    ports:
      - "3000:3000"
    volumes:
      - ./gateway:/app
      - /app/node_modules
    networks:
      - raft-net
    depends_on:
      replica1:
        condition: service_healthy
      replica2:
        condition: service_healthy
      replica3:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "8080:8080"
    networks:
      - raft-net
    depends_on:
      - gateway
    restart: unless-stopped
