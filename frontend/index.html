<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Distributed Drawing Board · Mini-RAFT</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --border: #2e2e42;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --leader: #00e5a0;
      --text: #e8e8f0;
      --muted: #6b6b8a;
      --error: #ff4d6d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--accent);
    }

    .logo span { color: var(--text); }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 12px;
      font-family: 'Space Mono', monospace;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .dot.connected { background: var(--leader); box-shadow: 0 0 8px var(--leader); }
    .dot.disconnected { background: var(--error); box-shadow: 0 0 8px var(--error); }
    .dot.election { background: #f9c74f; box-shadow: 0 0 8px #f9c74f; animation: pulse 0.5s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .leader-tag {
      background: rgba(108,99,255,0.15);
      border: 1px solid var(--accent);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 11px;
      color: var(--accent);
    }

    /* ── Toolbar ─────────────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .tool-label {
      font-size: 11px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .color-picker {
      display: flex;
      gap: 6px;
    }

    .color-btn {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
    }
    .color-btn:hover { transform: scale(1.2); }
    .color-btn.active { border-color: white; transform: scale(1.2); }

    .size-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 80px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
    }
    .size-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    .btn {
      background: var(--border);
      border: none;
      color: var(--text);
      padding: 6px 14px;
      border-radius: 6px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: var(--accent); }
    .btn.danger:hover { background: var(--error); }

    .divider {
      width: 1px; height: 24px;
      background: var(--border);
    }

    /* ── Main area ───────────────────────────────── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Canvas ──────────────────────────────────── */
    .canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
      background: #f8f8f2;
    }

    .canvas-overlay {
      position: absolute;
      top: 16px; left: 50%;
      transform: translateX(-50%);
      background: rgba(15,15,19,0.85);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .canvas-overlay.visible { opacity: 1; }

    /* ── Sidebar ─────────────────────────────────── */
    .sidebar {
      width: 240px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-title {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .replica-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .replica-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
    }

    .replica-name {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
    }

    .replica-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'Space Mono', monospace;
    }
    .replica-badge.leader {
      background: rgba(0,229,160,0.15);
      color: var(--leader);
      border: 1px solid var(--leader);
    }
    .replica-badge.follower {
      background: rgba(107,107,138,0.15);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .replica-badge.unknown {
      background: rgba(255,77,109,0.1);
      color: var(--error);
      border: 1px solid var(--error);
    }

    /* Log */
    .event-log {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .log-entry {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      animation: slideIn 0.2s ease;
    }
    .log-entry.election { color: #f9c74f; }
    .log-entry.commit { color: var(--leader); }
    .log-entry.error { color: var(--error); }
    .log-entry .ts { opacity: 0.5; margin-right: 6px; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Toast ───────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 13px;
      font-family: 'Space Mono', monospace;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s;
      z-index: 100;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: var(--leader); color: var(--leader); }
    .toast.warning { border-color: #f9c74f; color: #f9c74f; }
    .toast.error { border-color: var(--error); color: var(--error); }
  </style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────── -->
<header>
  <div class="logo">MINI<span>RAFT</span> · Drawing Board</div>
  <div class="status-bar">
    <div class="status-item">
      <div class="dot" id="conn-dot"></div>
      <span id="conn-label">Connecting...</span>
    </div>
    <div class="divider"></div>
    <div class="status-item">
      <span class="tool-label">Leader:</span>
      <span class="leader-tag" id="leader-label">—</span>
    </div>
    <div class="status-item">
      <span class="tool-label">Strokes:</span>
      <span id="stroke-count" style="font-family:'Space Mono',monospace;font-size:12px">0</span>
    </div>
  </div>
</header>

<!-- ── Toolbar ─────────────────────────────────────────── -->
<div class="toolbar">
  <span class="tool-label">Color</span>
  <div class="color-picker" id="color-picker">
    <div class="color-btn active" data-color="#1a1a2e" style="background:#1a1a2e"></div>
    <div class="color-btn" data-color="#e63946" style="background:#e63946"></div>
    <div class="color-btn" data-color="#2a9d8f" style="background:#2a9d8f"></div>
    <div class="color-btn" data-color="#e9c46a" style="background:#e9c46a"></div>
    <div class="color-btn" data-color="#6c63ff" style="background:#6c63ff"></div>
    <div class="color-btn" data-color="#ff6584" style="background:#ff6584"></div>
    <div class="color-btn" data-color="#f8f8f8" style="background:#f8f8f2;border:1px solid #ccc"></div>
  </div>
  <div class="divider"></div>
  <span class="tool-label">Size</span>
  <input type="range" class="size-slider" id="size-slider" min="2" max="30" value="4" />
  <span id="size-label" style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);width:20px">4</span>
  <div class="divider"></div>
  <button class="btn danger" id="clear-btn">Clear</button>
</div>

<!-- ── Main ───────────────────────────────────────────── -->
<div class="main">
  <div class="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div class="canvas-overlay" id="canvas-overlay">Election in progress — reconnecting...</div>
  </div>

  <div class="sidebar">
    <!-- Replica status -->
    <div class="sidebar-section">
      <div class="sidebar-title">Cluster Status</div>
      <div class="replica-list" id="replica-list">
        <div class="replica-item">
          <span class="replica-name">replica1</span>
          <span class="replica-badge unknown" id="badge-replica1">?</span>
        </div>
        <div class="replica-item">
          <span class="replica-name">replica2</span>
          <span class="replica-badge unknown" id="badge-replica2">?</span>
        </div>
        <div class="replica-item">
          <span class="replica-name">replica3</span>
          <span class="replica-badge unknown" id="badge-replica3">?</span>
        </div>
      </div>
    </div>

    <!-- Event log -->
    <div class="sidebar-title" style="padding: 12px 16px 0">Event Log</div>
    <div class="event-log" id="event-log"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Config ────────────────────────────────────────────────────
const WS_URL = `ws://${location.hostname}:3000`;
const STATUS_URLS = [
  { id: 'replica1', url: `http://${location.hostname}:4001/status` },
  { id: 'replica2', url: `http://${location.hostname}:4002/status` },
  { id: 'replica3', url: `http://${location.hostname}:4003/status` },
];

// ── Canvas Setup ──────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ── Drawing State ─────────────────────────────────────────────
let painting = false;
let currentColor = '#1a1a2e';
let currentSize = 4;
let strokeCount = 0;
let currentPath = [];
let pendingStrokes = []; // strokes from server to render

// ── Tool Controls ─────────────────────────────────────────────
document.getElementById('color-picker').addEventListener('click', (e) => {
  const btn = e.target.closest('.color-btn');
  if (!btn) return;
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentColor = btn.dataset.color;
});

const sizeSlider = document.getElementById('size-slider');
const sizeLabel = document.getElementById('size-label');
sizeSlider.addEventListener('input', () => {
  currentSize = parseInt(sizeSlider.value);
  sizeLabel.textContent = currentSize;
});

document.getElementById('clear-btn').addEventListener('click', () => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#f8f8f2';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  addLog('Canvas cleared locally', 'commit');
});

// ── Drawing Functions ─────────────────────────────────────────
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - rect.left) * (canvas.width / rect.width),
    y: (src.clientY - rect.top) * (canvas.height / rect.height),
  };
}

function drawSegment(from, to, color, size) {
  ctx.beginPath();
  ctx.moveTo(from.x, from.y);
  ctx.lineTo(to.x, to.y);
  ctx.strokeStyle = color;
  ctx.lineWidth = size;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.stroke();
}

// Local draw + send to server
canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseleave', endDraw);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e); }, { passive: false });
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); }, { passive: false });
canvas.addEventListener('touchend', endDraw);

let lastPos = null;

function startDraw(e) {
  painting = true;
  lastPos = getPos(e);
  currentPath = [lastPos];
}

function draw(e) {
  if (!painting) return;
  const pos = getPos(e);
  drawSegment(lastPos, pos, currentColor, currentSize);
  currentPath.push(pos);
  lastPos = pos;
}

function endDraw() {
  if (!painting || currentPath.length < 2) { painting = false; return; }
  painting = false;

  const stroke = {
    path: currentPath,
    color: currentColor,
    size: currentSize,
    clientId: clientId,
    ts: Date.now(),
  };

  sendStroke(stroke);
  currentPath = [];
  lastPos = null;
}

// ── Render a stroke from server ───────────────────────────────
function renderStroke(stroke) {
  const { path, color, size } = stroke;
  if (!path || path.length < 2) return;
  for (let i = 1; i < path.length; i++) {
    drawSegment(path[i - 1], path[i], color, size);
  }
  strokeCount++;
  document.getElementById('stroke-count').textContent = strokeCount;
}

// ── WebSocket ─────────────────────────────────────────────────
const clientId = 'client_' + Math.random().toString(36).substr(2, 8);
let ws = null;
let reconnectTimer = null;
let connected = false;

function connect() {
  clearTimeout(reconnectTimer);
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    connected = true;
    setConnStatus('connected', 'Connected');
    addLog('WebSocket connected', 'commit');
    hideOverlay();
  };

  ws.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);

      if (msg.type === 'stroke') {
        renderStroke(msg.stroke);
        addLog(`Stroke committed idx=${msg.index}`, 'commit');
      } else if (msg.type === 'leader') {
        const l = msg.leader ? msg.leader.split('/').pop() : '—';
        document.getElementById('leader-label').textContent = l;
      } else if (msg.type === 'error') {
        addLog(`Error: ${msg.message}`, 'error');
        showToast(msg.message, 'error');
      }
    } catch (_) {}
  };

  ws.onclose = () => {
    connected = false;
    setConnStatus('disconnected', 'Disconnected');
    addLog('WebSocket disconnected — reconnecting...', 'error');
    showOverlay();
    reconnectTimer = setTimeout(connect, 1500);
  };

  ws.onerror = () => {
    ws.close();
  };
}

function sendStroke(stroke) {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    addLog('Cannot send — not connected', 'error');
    return;
  }
  ws.send(JSON.stringify({ type: 'stroke', stroke }));
}

connect();

// ── Connection status UI ──────────────────────────────────────
function setConnStatus(state, label) {
  const dot = document.getElementById('conn-dot');
  dot.className = 'dot ' + state;
  document.getElementById('conn-label').textContent = label;
}

function showOverlay() {
  document.getElementById('canvas-overlay').classList.add('visible');
}
function hideOverlay() {
  document.getElementById('canvas-overlay').classList.remove('visible');
}

// ── Event Log ─────────────────────────────────────────────────
function addLog(msg, type = '') {
  const log = document.getElementById('event-log');
  const entry = document.createElement('div');
  entry.className = 'log-entry ' + type;
  const ts = new Date().toLocaleTimeString('en', { hour12: false });
  entry.innerHTML = `<span class="ts">${ts}</span>${msg}`;
  log.prepend(entry);
  // Keep max 60 entries
  while (log.children.length > 60) log.removeChild(log.lastChild);
}

// ── Cluster Status Polling ────────────────────────────────────
async function pollClusterStatus() {
  for (const { id, url } of STATUS_URLS) {
    try {
      const res = await fetch(url, { signal: AbortSignal.timeout(500) });
      const data = await res.json();
      updateReplicaBadge(id, data.state, data.term);
    } catch (_) {
      updateReplicaBadge(id, 'unknown', null);
    }
  }
}

function updateReplicaBadge(id, state, term) {
  const badge = document.getElementById('badge-' + id);
  if (!badge) return;
  badge.className = 'replica-badge ' + (state || 'unknown');
  badge.textContent = state === 'leader' ? `LEADER t=${term}` :
                      state === 'follower' ? `follower t=${term}` : '?';
}

setInterval(pollClusterStatus, 1000);
pollClusterStatus();

// ── Toast ─────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg, type = 'success') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
}

// ── Init canvas background ────────────────────────────────────
ctx.fillStyle = '#f8f8f2';
ctx.fillRect(0, 0, canvas.width, canvas.height);
</script>
</body>
</html>
